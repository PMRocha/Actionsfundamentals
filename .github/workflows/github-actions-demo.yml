name: GitHub Actions Demo

on:
  push:
    branches: main
    paths-ignore: ".github/**"
  pull_request:
    branches: main
  schedule:
    - cron: 15 6 * * SUN
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        type: environment
        required: true

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Event ${{ github.event_name }}"
      - run: echo "Branch ${{ github.ref }}"
      - uses: actions/checkout@v3.3.0
      - run: tree

  Test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: Build
    environment: Test
    steps:
      - run: echo "Testing..."

  Load-Test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: Build
    environment: Load-Test
    steps:
      - run: echo "Testing..."
      - run: sleep 15

  Production:
    runs-on: ubuntu-latest
    needs: [Load-Test, Test]
    environment:
      name: Production
      url: https://writeabout.net
    if: github.event.inputs.environment == 'Production'
    steps:
      - run: echo "step 1"
      - run: sleep 10
      - run: echo "step 2"
      - run: sleep 10
      - run: echo "step 3"
      - run: sleep 10
      - run: echo "step 4"
      - run: sleep 10
      - run: echo "step 5"
      - run: sleep 10
    


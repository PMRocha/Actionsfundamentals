name: Reusable workflow

on:
  workflow_call:
    inputs:
      who-to-greet:
        type: string
        default: World
    outputs:
      current-time:
        value: ${{ jobs.reusable-job.outputs.current-time }}

jobs:
  reusable-job:
    runs-on: ubuntu-latest

    steps:
      - run: echo "Hello "
      - name: time
        id: time
        run: echo "current-time=$(date)" >> $GITHUB_OUTPUT

    outputs:
      current-time: ${{ steps.time.outputs.current-time }}
        
